# GoDrive - Docker Compose
# PostgreSQL runs on host (Laragon); backend connects via host.docker.internal

services:
  nginx:
    image: nginx:alpine
    container_name: godrive-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - godrive-net
    restart: unless-stopped

  backend:
    build:
      context: ../Backend
      dockerfile: backend/Dockerfile
    container_name: godrive-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      # PostgreSQL on host (Laragon) - use host.docker.internal
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gdrive}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      # Redis in Docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_SKIP: "false"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGIN: /
      STORAGE_ROOT: /app/storage
      MAX_UPLOAD_MB: 500
      RUN_WORKERS: "true"
    volumes:
      - godrive-storage:/app/storage
    depends_on:
      - redis
    networks:
      - godrive-net
    restart: unless-stopped
    # Required for host.docker.internal on Linux (Docker Desktop Windows/Mac has it by default)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../Frontend
      dockerfile: frontend/Dockerfile
    container_name: godrive-frontend
    networks:
      - godrive-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: godrive-redis
    ports:
      - "6379:6379"
    volumes:
      - godrive-redis-data:/data
    networks:
      - godrive-net
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  godrive-net:
    driver: bridge

volumes:
  godrive-storage:
  godrive-redis-data:
